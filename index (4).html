<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1e4620"/>
<meta name="description" content="AgriPulse - Tamil Nadu Farmers Smart Advisory"/>
<link rel="manifest" href="/manifest.json"/>
<title>AgriPulse 🌾</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --gd:#1a3d1a;--g:#2d6a2d;--gm:#4a7c3f;--gl:#7ab648;--gp:#e8f5e0;
  --e:#6b4226;--gold:#c8963e;--goldf:#f5d485;
  --cream:#faf7f0;--sand:#f0e8d4;--card:#fff;
  --txt:#1a2e1a;--txs:#6a8a6a;
  --red:#c0392b;--org:#d4820a;--blue:#1a6891;--purple:#7b2d8b;
  --sh:0 2px 14px rgba(0,0,0,.09);--shs:0 1px 5px rgba(0,0,0,.06);
  --r:14px;--rs:9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--txt);}

/* HEADER */
#hdr{height:54px;background:var(--gd);display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:3px solid var(--gold);position:fixed;top:0;left:0;right:0;z-index:9999;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-ico{width:36px;height:36px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.logo h1{font-family:'Merriweather',serif;font-size:1rem;color:var(--goldf);line-height:1.1;}
.logo p{font-size:.57rem;color:#a8d8a0;letter-spacing:1px;text-transform:uppercase;}
.hright{display:flex;align-items:center;gap:7px;}
.lsw{display:flex;background:rgba(255,255,255,.12);border-radius:20px;overflow:hidden;border:1px solid rgba(200,150,62,.4);}
.lbtn{padding:4px 12px;border:none;background:transparent;color:#a8d8a0;font-size:.74rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s;}
.lbtn.on{background:var(--gold);color:var(--gd);}
.live-dot{width:8px;height:8px;background:#7ab648;border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* APP */
#app{position:fixed;top:54px;left:0;right:0;bottom:0;display:flex;}
#mapW{position:relative;flex:1;min-width:0;height:100%;}
#map{width:100%;height:100%;z-index:1;}
.map-tip{position:absolute;top:10px;left:10px;z-index:400;background:rgba(20,50,22,.93);border:1px solid var(--gold);border-radius:var(--rs);padding:9px 13px;color:#e8f5e0;font-size:.75rem;max-width:210px;pointer-events:none;}
.map-tip b{color:var(--goldf);display:block;margin-bottom:2px;}
.coord-pill{position:absolute;bottom:10px;left:10px;z-index:400;background:rgba(20,50,22,.92);border:1px solid var(--gm);border-radius:20px;padding:4px 12px;color:#a8d8a0;font-size:.7rem;font-family:monospace;display:none;}

/* VOICE MODE OVERLAY */
#voiceMode{
  display:none;position:fixed;inset:0;
  background:linear-gradient(160deg,#0d2b0d,#1a4a1a,#2d1b00);
  z-index:99999;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 24px;text-align:center;
}
#voiceMode.show{display:flex;}
.vm-title{font-family:'Merriweather',serif;font-size:1.4rem;color:var(--goldf);margin-bottom:8px;}
.vm-sub{font-size:.82rem;color:#a8d8a0;margin-bottom:30px;line-height:1.6;}
.vm-big-btn{
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,var(--gl),var(--gm));
  border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 0 0 rgba(122,182,72,.6);
  transition:.2s;font-size:4rem;
  animation:ripple 2s infinite;
}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(122,182,72,.5)}70%{box-shadow:0 0 0 30px rgba(122,182,72,0)}100%{box-shadow:0 0 0 0 rgba(122,182,72,0)}}
.vm-big-btn.talking{background:radial-gradient(circle,#e67e22,#c0392b);animation:none;}
.vm-btn-label{font-size:.82rem;font-weight:800;color:#fff;font-family:'Nunito',sans-serif;}
.vm-status{margin-top:24px;font-size:.9rem;color:#a8d8a0;min-height:28px;line-height:1.5;max-width:320px;}
.vm-speech-box{margin-top:16px;background:rgba(255,255,255,.08);border-radius:var(--r);padding:14px 18px;font-size:.85rem;color:#e8f5e0;line-height:1.7;max-width:340px;min-height:60px;display:none;}
.vm-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.vm-field-btn{margin-top:18px;background:rgba(200,150,62,.2);border:2px solid var(--gold);border-radius:20px;padding:8px 20px;color:var(--goldf);font-size:.8rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;}

/* VOICE TOGGLE BTN on map */
.voice-fab{
  position:absolute;bottom:60px;right:14px;z-index:400;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--gm),var(--gd));
  border:none;color:#fff;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
}

/* SIDEBAR */
#sidebar{width:390px;flex-shrink:0;display:flex;flex-direction:column;background:var(--cream);border-left:2px solid var(--sand);height:100%;overflow:hidden;}
.sb-tabs{display:flex;background:var(--gd);border-bottom:2px solid var(--gold);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.sb-tabs::-webkit-scrollbar{display:none;}
.stab{flex:1;min-width:48px;padding:8px 3px;border:none;background:transparent;color:#a8d8a0;font-size:.54rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;text-transform:uppercase;border-bottom:3px solid transparent;transition:.15s;}
.stab .si{font-size:.95rem;line-height:1;}
.stab.on{color:var(--goldf);border-bottom-color:var(--gold);background:rgba(200,150,62,.1);}
.sb-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.sb-body::-webkit-scrollbar{width:3px;}
.sb-body::-webkit-scrollbar-thumb{background:var(--sand);}

/* MOBILE BOTTOM NAV */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--gd);border-top:2px solid var(--gold);z-index:9999;}
.bnav-row{display:flex;}
.bnav-btn{flex:1;border:none;background:transparent;color:#a8d8a0;padding:7px 2px 6px;font-size:.52rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;text-transform:uppercase;}
.bnav-btn .ni{font-size:1.15rem;line-height:1;}
.bnav-btn.on{color:var(--goldf);}

/* MOBILE PANELS */
.mpanel{display:none;position:fixed;background:var(--cream);overflow-y:auto;z-index:8000;}
@media(min-width:769px){
  .mpanel{top:54px;right:0;bottom:0;width:390px;border-left:2px solid var(--sand);}
  .mpanel.open{display:block;}
  #bnav{display:none!important;}
  #sidebar{display:flex!important;}
}
@media(max-width:768px){
  #sidebar{display:none!important;}
  #bnav{display:block;}
  #app{bottom:54px;}
  .mpanel{left:0;right:0;bottom:54px;}
  #mAdv{top:auto;height:66vh;border-radius:18px 18px 0 0;border-top:3px solid var(--gold);box-shadow:0 -6px 28px rgba(0,0,0,.2);}
  #mAdv.open,#mFore.open,#mSoil.open,#mCal.open,#mPhoto.open,#mChat.open,#mSell.open,#mMore.open{display:block;}
  #mFore,#mSoil,#mCal,#mPhoto,#mChat,#mSell,#mMore{top:54px;}
}

/* COMPONENTS */
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 18px;text-align:center;gap:12px;min-height:320px;}
.idle-ico{font-size:50px;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.idle h2{font-family:'Merriweather',serif;font-size:1.1rem;color:var(--g);}
.idle p{font-size:.82rem;color:var(--txs);line-height:1.65;max-width:260px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.chip{background:var(--gp);border:1px solid #b8dba0;border-radius:20px;padding:4px 11px;font-size:.7rem;color:var(--gm);font-weight:700;}
.spinw{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;min-height:200px;}
.spin{width:36px;height:36px;border:4px solid var(--sand);border-top-color:var(--gm);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinw p{font-size:.82rem;color:var(--txs);}
.phdr{background:linear-gradient(135deg,var(--gd),var(--g));padding:14px 16px;flex-shrink:0;}
.phdr h2{font-family:'Merriweather',serif;font-size:.95rem;color:var(--goldf);margin-bottom:2px;}
.phdr p{font-size:.68rem;color:#a8d8a0;}
.wx{background:linear-gradient(135deg,var(--gd),var(--g));padding:16px;color:#fff;}
.wx-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.wx-cond{font-size:.92rem;font-weight:700;color:#d4f0c0;}
.wx-loc{font-size:.65rem;color:#a8d8a0;margin-top:2px;line-height:1.3;}
.wx-temp{font-family:'Merriweather',serif;font-size:2.4rem;color:var(--goldf);line-height:1;}
.wx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.wxc{background:rgba(255,255,255,.1);border-radius:var(--rs);padding:7px 4px;text-align:center;}
.wxc .wl{font-size:.55rem;color:#a8d8a0;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.wxc .wv{font-size:.82rem;font-weight:800;color:var(--goldf);}
.alerts-bar{display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px;background:#fff8e6;border-bottom:1px solid #f0dda0;}
.atag{padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:800;}
.atag.r{background:#fde;color:var(--red);}
.atag.o{background:#fef3d8;color:var(--org);}
.sec{padding:12px 14px;border-bottom:1px solid var(--sand);}
.sec-t{font-family:'Merriweather',serif;font-size:.8rem;color:var(--e);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.sec-t::after{content:'';flex:1;height:1px;background:var(--gold);opacity:.3;}
.alist{list-style:none;display:flex;flex-direction:column;gap:5px;}
.aitem{background:var(--card);border-left:3px solid var(--gm);border-radius:0 var(--rs) var(--rs) 0;padding:8px 11px;font-size:.78rem;line-height:1.5;box-shadow:var(--shs);}
.dcard{background:var(--card);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:11px;box-shadow:var(--shs);}
.dico{font-size:1.7rem;}
.dname{font-size:.85rem;font-weight:800;}
.dact{font-size:.72rem;color:var(--txs);margin-top:1px;}
.risk{margin-left:auto;padding:3px 9px;border-radius:20px;font-size:.64rem;font-weight:800;text-transform:uppercase;white-space:nowrap;}
.risk.lo{background:#e8f5e9;color:#2e7d32;}
.risk.me{background:#fff8e1;color:#f57f17;}
.risk.hi{background:#ffebee;color:#c62828;}
.btn-row{padding:10px 14px 14px;display:flex;flex-direction:column;gap:7px;}
.btnp{width:100%;background:linear-gradient(135deg,var(--gm),var(--gd));color:#fff;border:none;border-radius:var(--r);padding:12px;font-size:.83rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 3px 10px rgba(42,100,42,.25);transition:.15s;}
.btnp:active{transform:scale(.98);}
.btnp.stop{background:linear-gradient(135deg,#c0392b,#7b1010);}
.btns{width:100%;background:transparent;color:var(--e);border:2px solid var(--gold);border-radius:var(--r);padding:10px;font-size:.8rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;}
.btns:active{background:var(--gold);color:var(--gd);}
.ts{text-align:center;font-size:.62rem;color:#aaa;padding:5px;}

/* SELL DECISION */
.sell-hero{background:linear-gradient(135deg,#1a3d1a,#2d5a0a);padding:18px 16px;color:#fff;}
.sell-crop-sel{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.sell-crop-sel label{font-size:.72rem;color:#a8d8a0;font-weight:700;}
.sell-crop-sel select{background:rgba(255,255,255,.15);border:1px solid rgba(200,150,62,.5);border-radius:20px;color:#fff;padding:5px 12px;font-size:.78rem;font-family:'Nunito',sans-serif;cursor:pointer;}
.sell-crop-sel input{background:rgba(255,255,255,.15);border:1px solid rgba(200,150,62,.5);border-radius:20px;color:#fff;padding:5px 12px;font-size:.78rem;font-family:'Nunito',sans-serif;width:90px;}
.sell-crop-sel input::placeholder{color:rgba(255,255,255,.5);}
.sell-decision-box{background:rgba(255,255,255,.1);border-radius:var(--r);padding:14px;border-left:4px solid var(--gold);}
.sd-label{font-size:.65rem;color:#a8d8a0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:700;}
.sd-decision{font-family:'Merriweather',serif;font-size:1rem;color:var(--goldf);line-height:1.4;margin-bottom:8px;}
.sd-profit{font-size:.82rem;color:#a8d8a0;}
.sd-urgency{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:800;text-transform:uppercase;margin-top:6px;}
.sd-urgency.HIGH{background:#c0392b;color:#fff;}
.sd-urgency.MEDIUM{background:#d4820a;color:#fff;}
.sd-urgency.LOW{background:#27ae60;color:#fff;}
.mandi-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.mandi-card{background:var(--card);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shs);position:relative;overflow:hidden;}
.mandi-card.best{border:2px solid var(--gold);}
.mandi-card.best::before{content:'⭐ BEST';position:absolute;top:0;right:0;background:var(--gold);color:var(--gd);font-size:.6rem;font-weight:800;padding:3px 8px;border-bottom-left-radius:var(--rs);}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.mc-name{font-family:'Merriweather',serif;font-size:.88rem;color:var(--e);}
.mc-name-ta{font-size:.7rem;color:var(--txs);margin-top:1px;}
.mc-dist{font-size:.68rem;color:var(--txs);}
.mc-price{font-family:'Merriweather',serif;font-size:1.3rem;color:var(--g);font-weight:700;}
.mc-unit{font-size:.62rem;color:var(--txs);}
.mc-change{font-size:.7rem;font-weight:700;margin-top:2px;}
.mc-change.up{color:#27ae60;}
.mc-change.down{color:var(--red);}
.demand-tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:800;margin-top:6px;}
.demand-HIGH{background:#e8f5e9;color:#2e7d32;}
.demand-MEDIUM{background:#fff8e1;color:#f57f17;}
.demand-LOW{background:#ffebee;color:#c62828;}
.mc-specialty{font-size:.64rem;color:var(--blue);margin-top:3px;font-weight:700;}
.rain-warn{margin:0 14px 10px;background:#e3f2fd;border-radius:var(--rs);padding:9px 12px;font-size:.76rem;color:var(--blue);border-left:3px solid var(--blue);display:none;}
.sell-actions{padding:8px 14px 14px;display:flex;gap:8px;}
.sell-btn{flex:1;padding:11px;border:none;border-radius:var(--r);font-size:.76rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;}
.sell-btn:active{transform:scale(.97);}
.sell-btn.wa{background:#25D366;color:#fff;}
.sell-btn.ref{background:var(--gm);color:#fff;}

/* FORECAST */
.fscroll{display:flex;gap:7px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none;}
.fscroll::-webkit-scrollbar{display:none;}
.fday{flex-shrink:0;background:var(--card);border-radius:var(--rs);padding:9px 10px;text-align:center;box-shadow:var(--shs);min-width:64px;}
.fdate{font-size:.62rem;color:var(--txs);margin-bottom:3px;}
.ficon{font-size:1.3rem;line-height:1;margin:2px 0;}
.fmax{font-size:.82rem;font-weight:800;color:var(--e);}
.fmin{font-size:.7rem;color:var(--txs);}
.frain{font-size:.62rem;color:var(--blue);margin-top:2px;}
.chart-box{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:var(--sh);margin-top:8px;}

/* CALENDAR */
.mrow{display:flex;overflow-x:auto;gap:5px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--sand);scrollbar-width:none;}
.mrow::-webkit-scrollbar{display:none;}
.mchip{flex-shrink:0;padding:4px 11px;border-radius:20px;font-size:.7rem;font-weight:700;border:2px solid transparent;cursor:pointer;background:var(--sand);color:var(--txs);transition:.15s;}
.mchip.cur{border-color:var(--gold);background:#fef9ee;color:var(--e);}
.mchip.sel{background:var(--gm);color:#fff;border-color:var(--gm);}
.clist{padding:10px 14px;display:flex;flex-direction:column;gap:9px;}
.ccard{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shs);}
.ctop{padding:10px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid #f5f0e8;}
.c-ico{font-size:1.6rem;}
.c-en{font-family:'Merriweather',serif;font-size:.87rem;color:var(--e);}
.c-ta{font-size:.68rem;color:var(--txs);margin-top:1px;}
.stag{margin-left:auto;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:800;text-transform:uppercase;}
.sk{background:#e8f5e9;color:#2e7d32;}.sr{background:#e3f2fd;color:#1565c0;}.sz{background:#fff8e1;color:#f57f17;}
.cstats{padding:8px 13px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.csl{font-size:.6rem;color:#aaa;text-transform:uppercase;}
.csv{font-size:.76rem;color:var(--txt);font-weight:700;margin-top:1px;}
.bwrap{padding:0 13px 10px;}
.blbl{font-size:.6rem;color:#aaa;margin-bottom:4px;}
.btrack{display:flex;gap:2px;}
.bcell{flex:1;height:6px;border-radius:2px;background:#f0ebe0;}
.bcell.sow{background:var(--gm);}.bcell.gro{background:#a8d8a0;}.bcell.har{background:var(--gold);}
.bleg{display:flex;gap:10px;margin-top:4px;}
.bl2{display:flex;align-items:center;gap:3px;font-size:.58rem;color:#888;}
.bldot{width:7px;height:7px;border-radius:2px;}

/* PHOTO */
.upload-box{margin:12px 14px;background:var(--card);border:2px dashed var(--gold);border-radius:var(--r);padding:24px 16px;text-align:center;cursor:pointer;transition:.2s;}
.upload-box:hover{border-color:var(--gm);background:var(--gp);}
.upload-box .ui{font-size:2.4rem;margin-bottom:8px;}
.upload-box h3{font-family:'Merriweather',serif;font-size:.9rem;color:var(--e);margin-bottom:4px;}
.upload-box p{font-size:.74rem;color:var(--txs);}
input[type=file]{display:none;}
.cam-row{display:flex;gap:7px;margin:0 14px 12px;}
.cbtn{flex:1;padding:10px;border:none;border-radius:var(--r);font-size:.78rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;}
.cbtn:active{opacity:.8;}
.cbtn.gal{background:var(--gm);color:#fff;}
.cbtn.cam{background:var(--e);color:var(--goldf);}
.prev-wrap{margin:0 14px 10px;display:none;}
.prev-img{width:100%;border-radius:var(--r);max-height:190px;object-fit:cover;box-shadow:var(--sh);}
.scan-result{margin:0 14px 14px;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);display:none;}
.scan-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f5f0e8;}
.scan-em{font-size:1.8rem;}
.scan-name{font-family:'Merriweather',serif;font-size:.9rem;color:var(--e);}
.scan-rows{padding:5px 14px 8px;}
.scan-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f0e8;font-size:.74rem;}
.scan-row:last-child{border:none;}
.sr-l{color:var(--txs);}.sr-v{font-weight:700;text-align:right;max-width:58%;}
.treat-box{background:var(--gp);border-top:1px solid #c0e0b0;padding:10px 14px;}
.treat-box h4{font-size:.68rem;font-weight:800;color:var(--gm);text-transform:uppercase;margin-bottom:6px;}
.treat-item{font-size:.74rem;padding:2px 0;display:flex;gap:6px;line-height:1.4;}
.photo-note{margin:8px 14px 0;background:#fff8e6;border-radius:var(--rs);padding:9px 12px;font-size:.73rem;color:#7a5500;border-left:3px solid var(--gold);line-height:1.5;}
.tips-sec{padding:4px 14px 14px;display:flex;flex-direction:column;gap:6px;}
.tip{background:var(--card);border-radius:var(--rs);padding:9px 12px;font-size:.76rem;line-height:1.5;border-left:3px solid var(--gold);box-shadow:var(--shs);}

/* CHAT */
.chatbox{display:flex;flex-direction:column;height:100%;}
.chat-msgs{overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:220px;max-height:340px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--sand);}
.msg{max-width:85%;padding:9px 12px;border-radius:var(--r);font-size:.78rem;line-height:1.55;}
.msg.bot{background:var(--gp);border-bottom-left-radius:3px;align-self:flex-start;}
.msg.user{background:var(--gm);color:#fff;border-bottom-right-radius:3px;align-self:flex-end;}
.typing-msg{background:var(--gp);align-self:flex-start;border-radius:var(--r);padding:10px 14px;}
.dot{width:6px;height:6px;background:var(--gm);border-radius:50%;display:inline-block;animation:td 1s infinite;margin:0 2px;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
.quick-qs{display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px 5px;}
.qq{background:var(--gp);border:1px solid #b8dba0;border-radius:20px;padding:4px 10px;font-size:.7rem;color:var(--gm);font-weight:700;cursor:pointer;}
.qq:active{background:var(--gm);color:#fff;}
.chat-inp-row{display:flex;gap:7px;padding:8px 14px 10px;border-top:1px solid var(--sand);background:#fff;flex-shrink:0;}
.chat-inp{flex:1;padding:9px 12px;border:2px solid var(--sand);border-radius:20px;font-size:.8rem;font-family:'Nunito',sans-serif;color:var(--txt);}
.chat-inp:focus{outline:none;border-color:var(--gm);}
.chat-send{background:var(--gm);color:#fff;border:none;border-radius:20px;padding:9px 16px;font-size:.8rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;}

/* MORE */
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sbtn{padding:11px 8px;border:none;border-radius:var(--r);font-size:.75rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;}
.sbtn:active{transform:scale(.97);}
.sbtn.wa{background:#25D366;color:#fff;}
.sbtn.pdf{background:var(--red);color:#fff;}
.sbtn.sms{background:var(--blue);color:#fff;}
.sbtn.cp{background:var(--e);color:var(--goldf);}
.pwa-btn{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border:none;border-radius:var(--r);padding:13px;font-size:.85rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(42,100,42,.28);transition:.15s;}
.pwa-btn:active{transform:scale(.98);}
.pcalc{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pfld{display:flex;flex-direction:column;gap:3px;}
.pfld label{font-size:.67rem;color:var(--txs);text-transform:uppercase;font-weight:800;}
.pfld input,.pfld select{padding:8px 10px;border:2px solid var(--sand);border-radius:var(--rs);font-size:.8rem;font-family:'Nunito',sans-serif;color:var(--txt);background:#fff;}
.pfld input:focus,.pfld select:focus{outline:none;border-color:var(--gm);}
.presult{background:var(--gp);border-radius:var(--rs);padding:12px;margin-top:10px;display:none;}
.presult-row{display:flex;justify-content:space-between;padding:5px 0;font-size:.78rem;border-bottom:1px solid #c0e0b0;}
.presult-row:last-child{border:none;font-weight:800;font-size:.85rem;}
.ntextarea{width:100%;padding:9px 11px;border:2px solid var(--sand);border-radius:var(--rs);font-size:.8rem;font-family:'Nunito',sans-serif;resize:vertical;min-height:70px;color:var(--txt);}
.ntextarea:focus{outline:none;border-color:var(--gm);}
.dep-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shs);margin-bottom:10px;}
.dep-top{padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f5f0e8;}
.dep-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.dep-name{font-family:'Merriweather',serif;font-size:.88rem;color:var(--e);}
.dep-sub{font-size:.65rem;color:var(--txs);margin-top:1px;}
.ftag{margin-left:auto;background:var(--gp);color:var(--gm);padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:800;}
.dep-steps{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
.dstep{display:flex;gap:8px;align-items:flex-start;}
.dsn{width:18px;height:18px;min-width:18px;background:var(--gm);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;margin-top:2px;}
.dst{font-size:.74rem;color:#444;line-height:1.55;}
.code{background:#f5f0e8;border-radius:4px;padding:4px 8px;font-family:monospace;font-size:.68rem;color:var(--gd);margin-top:2px;display:block;overflow-x:auto;white-space:nowrap;}
.dep-note{margin:0 14px 14px;background:#fef9ee;border-radius:var(--r);padding:10px 13px;font-size:.74rem;color:#7a5500;line-height:1.6;border-left:3px solid var(--gold);}
.note-item{background:var(--card);border-radius:var(--r);padding:10px 12px;box-shadow:var(--sh);border-left:3px solid var(--gold);margin-bottom:7px;}
.note-date{font-size:.62rem;color:var(--txs);margin-bottom:3px;}
.note-text{font-size:.78rem;line-height:1.5;}

// MAP
var leafletMap, mapMarker;
function initMap(){
  leafletMap=L.map('map',{zoomControl:false}).setView([11.0,78.0],8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(leafletMap);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  leafletMap.on('click',function(e){
    var lat=e.latlng.lat,lng=e.latlng.lng;
    LATLON={lat:lat,lng:lng};
    if(mapMarker) leafletMap.removeLayer(mapMarker);
    mapMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:#c8963e;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>',iconAnchor:[7,7]})}).addTo(leafletMap);
    var cp=document.getElementById('coordPill');
    cp.textContent='📍 '+lat.toFixed(4)+', '+lng.toFixed(4);
    cp.style.display='block';
    fetchData(lat,lng);
    if(AUTO_T) clearInterval(AUTO_T);
    AUTO_T=setInterval(function(){if(LATLON) fetchData(LATLON.lat,LATLON.lng);},600000);
    if(window.innerWidth<=768) mTab('adv');
  });
}

function dTab(tab){

  document.querySelectorAll('.stab').forEach(function(b){b.classList.remove('on');});

  document.querySelectorAll('.mpanel').forEach(function(p){p.classList.remove('open');});
  renderInto('sbBody',tab);
}
function mTab(tab){
  MOB_TAB=tab;
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
  var b=document.getElementById('bn-'+tab);if(b)b.classList.add('on');
  document.querySelectorAll('.mpanel').forEach(function(p){p.classList.remove('open');});
  if(tab==='map') return;
  var pm={adv:'mAdv',sell:'mSell',fore:'mFore',soil:'mSoil',cal:'mCal',photo:'mPhoto',chat:'mChat',more:'mMore'};
  var pid=pm[tab];if(!pid)return;
  document.getElementById(pid).classList.add('open');

}
function rerender(){
  if(window.innerWidth<=768){
    var pm={adv:'mAdv',sell:'mSell',fore:'mFore',soil:'mSoil',cal:'mCal',photo:'mPhoto',chat:'mChat',more:'mMore'};
    if(MOB_TAB!=='map'&&pm[MOB_TAB]) renderInto(pm[MOB_TAB],MOB_TAB);
  } else {
    renderInto('sbBody',DESK_TAB);
  }
}
function renderInto(cid,tab){
  var el=document.getElementById(cid);if(!el)return;
  var fns={adv:buildAdv,sell:buildSell,fore:buildFore,soil:buildSoil,cal:buildCal,photo:buildPhoto,chat:buildChat,more:buildMore};
  el.innerHTML=(fns[tab]||buildAdv)();
  if(tab==='chat') initChat();
  if(tab==='fore'&&DATA&&DATA.state==='done') setTimeout(drawChart,100);
  if(tab==='sell'&&DATA&&DATA.state==='done') loadSellData();
}

// FETCH
function fetchData(lat,lon){
  DATA={state:'loading'};
  rerender();
  fetch('/api/advisory?lat='+lat+'&lon='+lon)
    .then(function(r){return r.json();})
    .then(function(json){
      if(json.error) throw new Error(json.error);
      var w=json.weather;
      var res=runRules(w);
      DATA={state:'done',weather:w,loc:lat.toFixed(4)+', '+lon.toFixed(4),
        advice:res.advice,alerts:res.alerts,disease:scanDis(w),
        mandi:buildLocalMandi(),soil:json.soil,kvk:json.kvk||[],
        forecast:json.forecast||[],rainNext3:json.rainNext3||0,ts:json.timestamp};
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
        .then(function(r){return r.json();})
        .then(function(gd){
          var a=gd.address||{};
          DATA.loc=[a.village||a.suburb||a.town||a.city,a.state_district,a.state].filter(Boolean).join(', ')||DATA.loc;
          rerender();
        }).catch(function(){rerender();});
    })
    .catch(function(err){DATA={state:'error',msg:err.message};rerender();});
}

function buildLocalMandi(){
  var d=new Date(),s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  function r(x){return((Math.sin(x)*9301+49297)%233280)/233280;}
  return{'Paddy (Raw)':Math.round(2100+r(s)*300),'Tomato':Math.round(1200+r(s*2)*1000),'Onion':Math.round(2000+r(s*3)*800),'Banana':Math.round(1000+r(s*4)*400),'Sugarcane':Math.round(3100+r(s*5)*200),'Groundnut':Math.round(5500+r(s*6)*600),'Cotton':Math.round(6200+r(s*7)*500),'Maize':Math.round(1800+r(s*8)*300)};
}

function runRules(w){
  var A=TX[LNG].adv,advice=[],alerts=[];
  var t=w.temperature,h=w.humidity,rain=w.precipitation,wind=w.wind_speed,uv=w.uv_index||0;
  if(rain>5)advice.push(A.no_irr);
  else if(h<35&&t>37){advice.push(A.drought);alerts.push('DROUGHT');}
  else if(h<45&&t>33){advice.push(A.high_irr);alerts.push('DROUGHT');}
  else if(h<55)advice.push(A.mod_irr);
  else advice.push(A.ok_moist);
  if(h>82&&t>25){advice.push(A.fungal);alerts.push('DISEASE');}
  else if(h>70)advice.push(A.monitor);
  else advice.push(A.low_pest);
  if(wind>25){advice.push(A.no_spray);alerts.push('WIND');}
  else if(rain>2)advice.push(A.rain_spray);
  else advice.push(A.ok_spray);
  if(t>40){advice.push(A.heat);alerts.push('HEAT');}
  else if(t<15)advice.push(A.cold);
  else advice.push(A.ok_temp(t));
  advice.push(uv>7?A.uv_hi:A.uv_ok);
  return{advice:advice,alerts:alerts};
}
function scanDis(w){
  var h=w.humidity,t=w.temperature,rain=w.precipitation,d=TX[LNG].diseases;
  if(h>82&&t>27&&rain>3)return d[1];
  if(h>78&&t>25)return d[2];
  if(h>68)return d[0];
  if(rain>5)return d[3];
  return d[4];
}
function wIcon(c){if(c===0)return'☀️';if([1,2,3].indexOf(c)>=0)return'⛅';if([45,48].indexOf(c)>=0)return'🌫️';if([51,53,55].indexOf(c)>=0)return'🌦️';if([61,63,65].indexOf(c)>=0)return'🌧️';if([80,81,82].indexOf(c)>=0)return'⛈️';if([95,96,99].indexOf(c)>=0)return'🌩️';return'🌈';}
function wCond(c){if(c===0)return'☀️ Clear Sky';if([1,2,3].indexOf(c)>=0)return'🌤️ Partly Cloudy';if([45,48].indexOf(c)>=0)return'🌫️ Foggy';if([51,53,55].indexOf(c)>=0)return'🌦️ Drizzle';if([61,63,65].indexOf(c)>=0)return'🌧️ Rain';if([80,81,82].indexOf(c)>=0)return'⛈️ Showers';if([95,96,99].indexOf(c)>=0)return'🌩️ Thunderstorm';return'🌈 Mixed';}

function buildAdv(){
  var t=TX[LNG];
  if(!DATA||DATA.state==='loading')return spinner(t.loading);

function calcYield(crop){
  if(!DATA||!DATA.weather)return;
  var base={Paddy:4.2,Tomato:25,Onion:15,Sugarcane:80,Groundnut:2,Cotton:1.8,Maize:5.5,Banana:30,Turmeric:6,Chilli:3,Coconut:8,Brinjal:18};
  var b=base[crop]||5,w=DATA.weather,f=1.0;
  var t=w.temperature,h=w.humidity,rain=w.precipitation;
  if(t>=22&&t<=35)f+=.1;else if(t>40)f-=.25;else if(t<15)f-=.2;
  if(h>=55&&h<=80)f+=.05;else if(h>85)f-=.1;
  if(rain>5)f+=.05;
  var pred=Math.round(b*Math.max(.4,Math.min(1.4,f))*100)/100;
  var pct=Math.round((pred/b)*100);
  var st=pct>=100?'🌟 Excellent':pct>=85?'✅ Good':pct>=70?'⚠️ Average':'❌ Below Average';
  var el=document.getElementById('yresult');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:8px 0;"><div style="font-family:Merriweather,serif;font-size:2rem;color:#2d6a2d;">'+pred+'</div><div style="font-size:.7rem;color:#7a9a7a;margin-bottom:6px;">'+TX[LNG].yUnit+'</div><div style="height:9px;background:#f0e8d4;border-radius:5px;overflow:hidden;margin:6px 0;"><div style="height:100%;border-radius:5px;background:linear-gradient(90deg,#7ab648,#4a7c3f);width:'+Math.min(pct,100)+'%;transition:width .8s;"></div></div><div style="font-size:.76rem;color:#7a9a7a;">'+st+' — '+pct+'% of expected</div></div>';
}

    .then(function(data){
      var reply=(data.content||[]).map(function(c){return c.text||'';}).join('')||'Sorry, could not answer. Please try again.';
      CHAT_HIST.push({role:'assistant',content:reply});
      removeTyping(tid);addMsg('bot',reply);
    })
    .catch(function(){removeTyping(tid);addMsg('bot',LNG==='ta'?'மன்னிக்கவும், பதில் கிடைக்கவில்லை.':'Sorry, could not get a response. Please try again.');});
}
function addMsg(who,text){var msgs=document.getElementById('chatMsgs');if(!msgs)return;var d=document.createElement('div');d.className='msg '+who;d.textContent=text;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function addTyping(id){var msgs=document.getElementById('chatMsgs');if(!msgs)return;var d=document.createElement('div');d.className='typing-msg';d.id=id;d.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function removeTyping(id){var el=document.getElementById(id);if(el)el.remove();}

// MORE
function buildMore(){
  var t=TX[LNG];
  var notes=NOTES.slice(-5).reverse();
  var notesH=notes.length===0?'<p style="font-size:.78rem;color:#aaa;padding:4px 0;">'+t.noteEmpty+'</p>':notes.map(function(n){return'<div class="note-item"><div class="note-date">📅 '+n.date+(n.loc?' • 📍 '+n.loc:'')+'</div><div class="note-text">'+n.text+'</div></div>';}).join('');
  return'<div class="phdr"><h2>'+(LNG==='ta'?'⚙️ மேலும் கருவிகள்':'⚙️ More Tools')+'</h2><p>'+(LNG==='ta'?'லாபம், குறிப்புகள், பகிர்வு':'Profit, notes, sharing')+'</p></div><div class="sec"><div class="sec-t">'+t.sShare+'</div><div class="share-grid"><button class="sbtn wa" onclick="shareWA()">'+t.shareWA+'</button><button class="sbtn pdf" onclick="savePDF()">'+t.sharePDF+'</button><button class="sbtn sms" onclick="shareSMS()">'+t.shareSMS+'</button><button class="sbtn cp" onclick="copyAdv()">'+t.shareCopy+'</button></div><button class="pwa-btn" style="margin-top:8px;" onclick="installPWA()">'+t.pwaBtn+'</button></div><div class="sec"><div class="sec-t">'+t.sCalc+'</div><div class="pcalc"><div class="pgrid"><div class="pfld"><label>'+t.calcCrop+'</label><select id="pcrop">'+TX.en.cropList.map(function(c){return'<option>'+c+'</option>';}).join('')+'</select></div><div class="pfld"><label>'+t.calcArea+'</label><input type="number" id="parea" value="1" min="0.1" step="0.1"/></div><div class="pfld"><label>'+t.calcCost+'</label><input type="number" id="pcost" value="10000"/></div><div class="pfld"><label>'+t.calcYield+'</label><input type="number" id="pyield" value="20"/></div></div><button class="btnp" onclick="calcProfit()">'+t.calcBtn+'</button><div class="presult" id="presult"></div></div></div><div class="sec"><div class="sec-t">'+t.sNotes+'</div><div>'+notesH+'</div><textarea class="ntextarea" id="noteIn" placeholder="'+t.notePH+'"></textarea><button class="btnp" style="margin-top:7px;" onclick="saveNote()">'+t.noteSave+'</button></div><div class="sec"><div class="sec-t">'+t.sDeploy+'</div><div class="dep-card"><div class="dep-top"><div class="dep-ico" style="background:#e8f5e9;">▲</div><div><div class="dep-name">Vercel</div><div class="dep-sub">Fastest — recommended for this project</div></div><div class="ftag">'+t.deplFree+'</div></div><div class="dep-steps"><div class="dstep"><div class="dsn">1</div><div class="dst">Push code to GitHub</div></div><div class="dstep"><div class="dsn">2</div><div class="dst">Go to <strong>vercel.com</strong> → Import → Select repo</div></div><div class="dstep"><div class="dsn">3</div><div class="dst">Vercel auto-detects structure → click Deploy → Live in 30 seconds! 🎉</div></div><div class="dstep"><div class="dsn">4</div><div class="dst">Your URL: <code class="code">agripulse.vercel.app</code></div></div></div></div><div class="dep-note">💡 SIH tip: Deploy on Vercel before demo. Share the URL with judges — they can open on their own phones!</div></div>';
}

// VOICE MODE
function openVoiceMode(){
  var t=TX[LNG];
  document.getElementById('vmTitle').textContent=t.vmTitle;
  document.getElementById('vmSub').textContent=t.vmSub;
  document.getElementById('vmBtnLabel').textContent=t.vmBtnLabel;
  document.getElementById('vmStatus').textContent=DATA&&DATA.state==='done'?'Field: '+DATA.loc:t.vmStatus;
  document.getElementById('vmSpeechBox').style.display='none';
  document.getElementById('voiceMode').classList.add('show');
}
function closeVoiceMode(){
  document.getElementById('voiceMode').classList.remove('show');
  if(window.speechSynthesis.speaking) window.speechSynthesis.cancel();
}
function voiceModeSpeak(){
  if(window.speechSynthesis.speaking){
    window.speechSynthesis.cancel();
    resetVoiceMode();
    return;
  }
  if(!DATA||DATA.state!=='done'){
    document.getElementById('vmStatus').textContent=LNG==='ta'?'முதலில் வரைபடத்தில் வயலை கிளிக் செய்யுங்கள்':'Please click your field on the map first.';
    return;
  }
  var t=TX[LNG],w=DATA.weather,dis=DATA.disease;
  var sellText='';
  if(SELL_DATA&&SELL_DATA.sellDecision){
    var sd=SELL_DATA.sellDecision;
    sellText=LNG==='ta'?' விற்பனை பரிந்துரை: '+(sd.decisionTa||sd.decision)+'.':' Sell recommendation: '+(sd.decision)+'.';
  }
  var text,lc;
  if(LNG==='ta'){
    text='வணக்கம்! நான் உங்கள் AgriPulse வேளாண் உதவியாளர். '+
      'இடம்: '+DATA.loc+'. '+
      'தற்போதைய வானிலை: வெப்பநிலை '+w.temperature+' டிகிரி செல்சியஸ். '+
      'ஈரப்பதம் '+w.humidity+' சதவீதம். '+
      'மழைவீழ்ச்சி '+w.precipitation+' மில்லிமீட்டர். '+
      DATA.advice.join('. ')+'. '+
      'நோய் ஸ்கேன் முடிவு: '+dis.name+'. '+dis.action+'. '+
      sellText+
      ' மண்டி விலைகளை திரையில் பாருங்கள். நன்றி!';
    lc='ta-IN';
  } else {
    text='Hello! I am your AgriPulse farming advisor. '+
      'Location: '+DATA.loc+'. '+
      'Current weather: temperature '+w.temperature+' degrees Celsius. '+
      'Humidity '+w.humidity+' percent. '+
      'Rainfall '+w.precipitation+' millimeters. '+
      DATA.advice.join('. ')+'. '+
      'Disease scan result: '+TX.en.riskL[dis.risk]+' of '+dis.name+'. '+dis.action+'. '+
      sellText+
      ' Please check market prices on screen. Thank you!';
    lc='en-IN';
  }
  var speechBox=document.getElementById('vmSpeechBox');
  speechBox.textContent=text;
  speechBox.style.display='block';
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lc; u.rate=0.85; u.pitch=1.0;
  var vs=window.speechSynthesis.getVoices();
  var bv=vs.filter(function(v){return v.lang===lc;})[0]||vs.filter(function(v){return v.lang.indexOf(lc.split('-')[0])===0;})[0];
  if(bv) u.voice=bv;
  var btn=document.getElementById('vmBtn');
  var st=document.getElementById('vmStatus');
  btn.classList.add('talking');
  btn.querySelector('.vm-btn-label').textContent=t.vmSpeaking||'STOP';
  st.textContent=t.vmSpeaking||'Speaking…';
  u.onend=function(){resetVoiceMode();};
  u.onerror=function(){resetVoiceMode();};
  window.speechSynthesis.speak(u);
}
function resetVoiceMode(){
  var t=TX[LNG];
  var btn=document.getElementById('vmBtn');
  if(btn){btn.classList.remove('talking');btn.querySelector('.vm-btn-label').textContent=t.vmBtnLabel||'SPEAK';}
  var st=document.getElementById('vmStatus');
  if(st) st.textContent=t.vmDone||'Done! Tap again to repeat.';
}

// VOICE IN ADVISORY
function toggleVoice(){
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();setVBtn(false);return;}
  if(!DATA||DATA.state!=='done')return;
  var t=TX[LNG],w=DATA.weather,dis=DATA.disease;
  var text,lc;
  if(LNG==='ta'){
    text='AgriPulse வயல் ஆலோசனை. இடம்: '+DATA.loc+'. வெப்பநிலை '+w.temperature+' டிகிரி. ஈரப்பதம் '+w.humidity+' சதவீதம். '+DATA.advice.join('. ')+'. நோய் ஸ்கேன்: '+dis.name+'. '+dis.action+'. மண்டி விலைகளை திரையில் பாருங்கள்.';
    lc='ta-IN';
  } else {
    text='AgriPulse Field Advisory. Location: '+DATA.loc+'. Temperature '+w.temperature+' degrees. Humidity '+w.humidity+' percent. '+DATA.advice.join('. ')+'. Disease: '+t.riskL[dis.risk]+' of '+dis.name+'. '+dis.action+'. Check market prices on screen.';
    lc='en-IN';
  }
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lc;u.rate=0.88;u.pitch=1.0;
  var vs=window.speechSynthesis.getVoices();
  var bv=vs.filter(function(v){return v.lang===lc;})[0]||vs.filter(function(v){return v.lang.indexOf(lc.split('-')[0])===0;})[0];
  if(bv)u.voice=bv;
  u.onstart=function(){setVBtn(true);};
  u.onend=function(){setVBtn(false);};
  u.onerror=function(){setVBtn(false);};
  window.speechSynthesis.speak(u);
}
function setVBtn(on){var b=document.getElementById('voiceBtn');if(!b)return;b.textContent=on?TX[LNG].btnStop:TX[LNG].btnVoice;b.classList.toggle('stop',on);}
function doRefresh(){if(LATLON)fetchData(LATLON.lat,LATLON.lng);}

// PROFIT
function calcProfit(){
  var area=parseFloat(document.getElementById('parea').value)||1;
  var cost=parseFloat(document.getElementById('pcost').value)||0;
  var yld=parseFloat(document.getElementById('pyield').value)||0;
  var crop=document.getElementById('pcrop').value||'Paddy';
  var prices=DATA&&DATA.mandi?DATA.mandi:buildLocalMandi();
  var pkey=Object.keys(prices).filter(function(k){return k.toLowerCase().indexOf(crop.toLowerCase())>=0;})[0]||Object.keys(prices)[0];
  var pricePerKg=(prices[pkey]||3000)/100;
  var revenue=Math.round(yld*area*pricePerKg*100);
  var profit=revenue-cost;
  var t=TX[LNG],el=document.getElementById('presult');if(!el)return;
  el.style.display='block';
  el.innerHTML='<div class="presult-row"><span>'+t.revenue+'</span><span>₹'+revenue.toLocaleString('en-IN')+'</span></div><div class="presult-row"><span>'+t.totalCost+'</span><span>₹'+cost.toLocaleString('en-IN')+'</span></div><div class="presult-row"><span>'+t.netProfit+'</span><span style="color:'+(profit>=0?'#2d6a2d':'#c0392b')+';font-weight:800;">₹'+Math.abs(profit).toLocaleString('en-IN')+' '+(profit>=0?'✅ Profit':'❌ Loss')+'</span></div>';
}

// NOTES
function saveNote(){
  var inp=document.getElementById('noteIn');if(!inp)return;
  var text=inp.value.trim();if(!text)return;
  NOTES.push({text:text,date:new Date().toLocaleDateString('en-IN'),loc:DATA&&DATA.loc?DATA.loc:''});
  try{localStorage.setItem('agri_notes',JSON.stringify(NOTES));}catch(e){}
  inp.value='';rerender();
}

// SHARE
function getAdvText(){
  if(!DATA||DATA.state!=='done')return'No advisory data.';
  var w=DATA.weather,mko=DATA.mandi||buildLocalMandi();
  var sellLine=SELL_DATA&&SELL_DATA.sellDecision?'\n\n💹 Sell: '+(LNG==='ta'?SELL_DATA.sellDecision.decisionTa:SELL_DATA.sellDecision.decision):'';
  return'🌾 AgriPulse Advisory\n📍 '+DATA.loc+'\n🌡️ '+w.temperature+'°C | 💧'+w.humidity+'%\n\n'+DATA.advice.join('\n')+'\n\n🔬 Disease: '+DATA.disease.name+' ('+DATA.disease.action+')'+sellLine+'\n\n💰 Market Prices:\n'+Object.keys(mko).map(function(k){return k+': ₹'+mko[k];}).join('\n')+'\n\nPowered by AgriPulse 🌾';
}
function shareWA(){window.open('https://wa.me/?text='+encodeURIComponent(getAdvText()),'_blank');}
function savePDF(){window.print();}
function shareSMS(){window.open('sms:?body='+encodeURIComponent(getAdvText().substring(0,160)));}
function copyAdv(){
  var text=getAdvText();
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){alert('Advisory copied!');});}
  else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Copied!');}
}

// PWA
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;});
function installPWA(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;});}
  else{alert('Open in Chrome/Edge and use browser menu → "Add to Home Screen".');}
}

// INIT
window.addEventListener('load',function(){
  initMap();
  updateTxt();
  renderInto('sbBody','adv');
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
  if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
});
</script>
