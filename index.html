<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1a3d1a"/>
<meta name="description" content="AgriPulse — Tamil Nadu விவசாயிகளுக்கான நேரடி வேளாண் ஆலோசனை"/>
<link rel="manifest" href="/manifest.json"/>
<title>AgriPulse — Smart Farming</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ══ DESIGN SYSTEM ══════════════════════════════════ */
:root{
  --forest:#1a3d1a; --green:#2d6a2d; --mid:#4a7c3f; --light:#7ab648; --pale:#e8f5e0;
  --earth:#5c3a1e; --gold:#c8963e; --gold-l:#f5d485;
  --bg:#f7f4ef; --card:#ffffff; --sand:#ede8df;
  --txt:#1c2b1c; --soft:#6b856b; --muted:#9aaa9a;
  --danger:#c0392b; --warn:#d4820a; --info:#1a6891; --ok:#27ae60;
  --r:16px; --r-sm:10px; --r-xs:6px;
  --shadow:0 4px 20px rgba(0,0,0,.10);
  --shadow-sm:0 2px 8px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;}

/* ══ HEADER ══════════════════════════════════════ */
#header{
  height:60px;background:var(--forest);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:3px solid var(--gold);
  position:fixed;top:0;left:0;right:0;z-index:9999;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-ico{
  width:40px;height:40px;background:var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 2px 8px rgba(200,150,62,.4);flex-shrink:0;
}
.brand-name{font-family:'Merriweather',serif;font-size:1.15rem;color:var(--gold-l);line-height:1.1;}
.brand-tag{font-size:.58rem;color:#a8d8a0;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.live-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(122,182,72,.18);border:1px solid var(--light);
  border-radius:20px;padding:4px 10px;
  font-size:.65rem;font-weight:800;color:var(--light);letter-spacing:.5px;
}
.live-dot{width:7px;height:7px;background:var(--light);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.lang-sw{display:flex;background:rgba(255,255,255,.1);border-radius:20px;overflow:hidden;border:1px solid rgba(200,150,62,.3);}
.lang-btn{padding:5px 14px;border:none;background:transparent;color:#a8d8a0;font-size:.75rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:.2s;letter-spacing:.3px;}
.lang-btn.on{background:var(--gold);color:var(--forest);}

/* ══ APP LAYOUT ══════════════════════════════════ */
#app{position:fixed;top:60px;left:0;right:0;bottom:0;display:flex;}

/* ══ MAP ══════════════════════════════════════ */
#mapArea{position:relative;flex:1;min-width:0;height:100%;}
#map{width:100%;height:100%;z-index:1;}
.map-overlay{
  position:absolute;top:14px;left:14px;z-index:500;
  background:rgba(20,50,22,.94);border:1.5px solid var(--gold);
  border-radius:var(--r-sm);padding:10px 14px;color:#e8f5e0;
  font-size:.78rem;max-width:220px;backdrop-filter:blur(8px);
  pointer-events:none;line-height:1.5;
}
.map-overlay b{color:var(--gold-l);display:block;font-size:.82rem;margin-bottom:2px;}
.coord-tag{
  position:absolute;bottom:12px;left:14px;z-index:500;
  background:rgba(20,50,22,.92);border:1px solid var(--mid);
  border-radius:20px;padding:5px 13px;color:#a8d8a0;
  font-size:.7rem;font-family:monospace;display:none;
}
.gps-btn{
  position:absolute;bottom:60px;right:14px;z-index:500;
  width:46px;height:46px;border-radius:50%;
  background:var(--card);border:2px solid var(--mid);
  color:var(--mid);font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:.2s;
}
.gps-btn:active{transform:scale(.95);}
.voice-fab{
  position:absolute;bottom:120px;right:14px;z-index:500;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--mid),var(--forest));
  border:none;color:#fff;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(42,100,42,.4);
  display:flex;align-items:center;justify-content:center;
  animation:voripple 3s infinite;
}
@keyframes voripple{0%,100%{box-shadow:0 4px 16px rgba(42,100,42,.4)}50%{box-shadow:0 4px 30px rgba(42,100,42,.7)}}

/* ══ VOICE OVERLAY ══════════════════════════════ */
#voiceScreen{
  display:none;position:fixed;inset:0;z-index:99999;
  background:linear-gradient(160deg,#0a1f0a,#1a3d1a,#0d2b14);
  flex-direction:column;align-items:center;justify-content:center;
  padding:30px;text-align:center;
}
#voiceScreen.show{display:flex;}
.vs-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.vs-title{font-family:'Merriweather',serif;font-size:1.5rem;color:var(--gold-l);margin-bottom:8px;}
.vs-sub{font-size:.85rem;color:#a8d8a0;margin-bottom:36px;line-height:1.7;max-width:300px;}
.vs-circle{
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,var(--light),var(--mid));
  border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  font-size:3.5rem;box-shadow:0 8px 40px rgba(122,182,72,.4);
  transition:.2s;
}
.vs-circle:active{transform:scale(.95);}
.vs-circle.active{background:radial-gradient(circle at 35% 35%,#e67e22,var(--danger));box-shadow:0 8px 40px rgba(192,57,43,.5);}
.vs-circle-lbl{font-size:.8rem;font-weight:800;color:#fff;font-family:'Nunito',sans-serif;letter-spacing:1px;}
.vs-status{margin-top:24px;font-size:.9rem;color:#a8d8a0;min-height:24px;max-width:320px;line-height:1.6;}
.vs-scroll{margin-top:16px;background:rgba(255,255,255,.07);border-radius:var(--r);padding:14px 18px;max-width:360px;font-size:.82rem;color:#e8f5e0;line-height:1.8;display:none;text-align:left;max-height:200px;overflow-y:auto;}
.vs-back{margin-top:24px;background:rgba(200,150,62,.15);border:2px solid var(--gold);border-radius:20px;padding:9px 24px;color:var(--gold-l);font-size:.82rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;letter-spacing:.3px;}

/* ══ SIDEBAR ══════════════════════════════════ */
#sidebar{
  width:420px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg);border-left:2px solid var(--sand);height:100%;
}
.tabs{
  display:flex;background:var(--forest);
  border-bottom:3px solid var(--gold);flex-shrink:0;
}
.tab{
  flex:1;padding:10px 4px;border:none;background:transparent;
  color:#a8d8a0;font-size:.58rem;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  text-transform:uppercase;letter-spacing:.3px;
  border-bottom:3px solid transparent;transition:.15s;
}
.tab .ti{font-size:1.1rem;line-height:1;}
.tab.on{color:var(--gold-l);border-bottom-color:var(--gold);background:rgba(200,150,62,.08);}
.tab-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.tab-body::-webkit-scrollbar{width:4px;}
.tab-body::-webkit-scrollbar-thumb{background:var(--sand);border-radius:2px;}

/* ══ MOBILE BOTTOM NAV ══════════════════════════ */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--forest);border-top:3px solid var(--gold);z-index:9999;}
.bnav-row{display:flex;}
.bnav-btn{flex:1;border:none;background:transparent;color:#a8d8a0;padding:8px 3px 7px;font-size:.55rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;text-transform:uppercase;}
.bnav-btn .ni{font-size:1.2rem;line-height:1;}
.bnav-btn.on{color:var(--gold-l);}

/* ══ MOBILE PANELS ══════════════════════════════ */
.panel{display:none;position:fixed;background:var(--bg);overflow-y:auto;z-index:8000;}
@media(min-width:769px){
  .panel{top:60px;right:0;bottom:0;width:420px;border-left:2px solid var(--sand);}
  .panel.open{display:block;}
  #bnav{display:none!important;}
  #sidebar{display:flex!important;}
}
@media(max-width:768px){
  #sidebar{display:none!important;}
  #bnav{display:block;}
  #app{bottom:58px;}
  .panel{left:0;right:0;bottom:58px;}
  #pAdv{top:auto;height:68vh;border-radius:20px 20px 0 0;border-top:3px solid var(--gold);box-shadow:0 -8px 40px rgba(0,0,0,.2);}
  #pAdv.open{display:flex;flex-direction:column;}
  #pFore,#pSoil,#pChat,#pMore{top:60px;}
  .panel.open{display:block;}
}

/* ══ COMMON COMPONENTS ══════════════════════════ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;text-align:center;gap:14px;min-height:320px;}
.empty-ico{font-size:56px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.empty-title{font-family:'Merriweather',serif;font-size:1.15rem;color:var(--green);}
.empty-desc{font-size:.85rem;color:var(--soft);line-height:1.7;max-width:270px;}
.feature-pills{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.pill{background:var(--pale);border:1px solid #b8dba0;border-radius:20px;padding:5px 13px;font-size:.72rem;color:var(--mid);font-weight:700;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:14px;min-height:200px;}
.loader{width:40px;height:40px;border:4px solid var(--sand);border-top-color:var(--mid);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p{font-size:.85rem;color:var(--soft);}
.page-header{background:linear-gradient(135deg,var(--forest),var(--green));padding:16px 18px;flex-shrink:0;}
.page-header h2{font-family:'Merriweather',serif;font-size:1rem;color:var(--gold-l);margin-bottom:3px;}
.page-header p{font-size:.7rem;color:#a8d8a0;opacity:.9;}
.section{padding:14px 18px;border-bottom:1px solid var(--sand);}
.section-title{font-family:'Merriweather',serif;font-size:.85rem;color:var(--earth);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--gold);opacity:.3;}
.btn-primary{
  width:100%;background:linear-gradient(135deg,var(--mid),var(--forest));
  color:#fff;border:none;border-radius:var(--r);padding:14px;
  font-size:.88rem;font-weight:800;font-family:'Nunito',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:8px;box-shadow:0 4px 14px rgba(42,100,42,.3);transition:.15s;
  letter-spacing:.3px;
}
.btn-primary:active{transform:scale(.98);}
.btn-primary.danger{background:linear-gradient(135deg,var(--danger),#7b1010);}
.btn-outline{
  width:100%;background:transparent;color:var(--earth);
  border:2px solid var(--gold);border-radius:var(--r);padding:11px;
  font-size:.85rem;font-weight:800;font-family:'Nunito',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:8px;transition:.15s;letter-spacing:.3px;
}
.btn-outline:active{background:var(--gold);color:var(--forest);}
.btn-row{padding:12px 18px 16px;display:flex;flex-direction:column;gap:8px;}
.timestamp{text-align:center;font-size:.65rem;color:var(--muted);padding:6px;}

/* ══ WEATHER CARD ══════════════════════════════ */
.weather-hero{background:linear-gradient(135deg,var(--forest),var(--green));padding:20px 18px;color:#fff;}
.weather-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.weather-cond{font-size:1rem;font-weight:700;color:#d4f0c0;}
.weather-loc{font-size:.68rem;color:#a8d8a0;margin-top:3px;line-height:1.4;max-width:200px;}
.weather-temp{font-family:'Merriweather',serif;font-size:3rem;color:var(--gold-l);line-height:1;}
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.wx-cell{background:rgba(255,255,255,.12);border-radius:var(--r-sm);padding:9px 6px;text-align:center;}
.wx-cell .wl{font-size:.58rem;color:#a8d8a0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.wx-cell .wv{font-size:.88rem;font-weight:800;color:var(--gold-l);}
.alerts-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 18px;background:#fff8e6;border-bottom:1px solid #f0dda0;}
.alert-tag{padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:800;}
.alert-tag.red{background:#fde;color:var(--danger);}
.alert-tag.orange{background:#fef3d8;color:var(--warn);}
.alert-tag.blue{background:#e3f2fd;color:var(--info);}

/* ══ ADVISORY LIST ══════════════════════════════ */
.adv-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
.adv-item{
  background:var(--card);border-left:4px solid var(--mid);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  padding:10px 13px;font-size:.82rem;line-height:1.6;
  box-shadow:var(--shadow-sm);
}
.adv-item.warn{border-left-color:var(--warn);}
.adv-item.danger{border-left-color:var(--danger);}
.adv-item.ok{border-left-color:var(--ok);}

/* ══ DISEASE CARD ══════════════════════════════ */
.disease-card{background:var(--card);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);}
.dis-ico{font-size:1.9rem;}
.dis-name{font-size:.9rem;font-weight:800;color:var(--txt);}
.dis-act{font-size:.74rem;color:var(--soft);margin-top:2px;line-height:1.4;}
.risk-tag{margin-left:auto;padding:4px 10px;border-radius:20px;font-size:.67rem;font-weight:800;text-transform:uppercase;white-space:nowrap;}
.risk-tag.lo{background:#e8f5e9;color:#2e7d32;}
.risk-tag.me{background:#fff8e1;color:#f57f17;}
.risk-tag.hi{background:#ffebee;color:#c62828;}

/* ══ FORECAST ══════════════════════════════════ */
.forecast-scroll{display:flex;gap:8px;overflow-x:auto;padding:3px 0 8px;scrollbar-width:none;}
.forecast-scroll::-webkit-scrollbar{display:none;}
.fore-card{flex-shrink:0;background:var(--card);border-radius:var(--r-sm);padding:10px 12px;text-align:center;box-shadow:var(--shadow-sm);min-width:68px;}
.fore-date{font-size:.63rem;color:var(--soft);margin-bottom:3px;font-weight:700;}
.fore-ico{font-size:1.4rem;line-height:1;margin:3px 0;}
.fore-max{font-size:.85rem;font-weight:800;color:var(--earth);}
.fore-min{font-size:.72rem;color:var(--soft);}
.fore-rain{font-size:.63rem;color:var(--info);margin-top:2px;font-weight:700;}
.chart-wrap{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm);margin-top:8px;}

/* ══ SOIL ══════════════════════════════════════ */
.soil-card{background:var(--card);border-radius:var(--r);padding:15px;box-shadow:var(--shadow-sm);}
.soil-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.soil-ico{font-size:2.2rem;}
.soil-name{font-family:'Merriweather',serif;font-size:.95rem;color:var(--earth);}
.soil-name-ta{font-size:.72rem;color:var(--soft);margin-top:2px;}
.soil-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sand);font-size:.78rem;}
.soil-row:last-child{border:none;}
.soil-label{color:var(--soft);}
.soil-val{font-weight:700;text-align:right;max-width:60%;}
.soil-tip{background:var(--pale);border-radius:var(--r-sm);padding:10px 12px;font-size:.76rem;color:var(--green);margin-top:10px;line-height:1.6;border-left:3px solid var(--mid);}

/* ══ KVK CARDS ══════════════════════════════════ */
.kvk-card{background:var(--card);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;box-shadow:var(--shadow-sm);border-left:3px solid var(--gold);}
.kvk-name{font-family:'Merriweather',serif;font-size:.88rem;color:var(--earth);margin-bottom:6px;}
.kvk-row{font-size:.76rem;color:#444;padding:2px 0;display:flex;align-items:center;gap:6px;}
.kvk-row a{color:var(--info);text-decoration:none;font-weight:700;}

/* ══ CHAT ══════════════════════════════════════ */
.chat-wrap{display:flex;flex-direction:column;height:100%;}
.chat-messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;min-height:220px;max-height:360px;}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--sand);}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:var(--r);font-size:.82rem;line-height:1.6;}
.chat-msg.bot{background:var(--pale);border-bottom-left-radius:3px;align-self:flex-start;color:var(--txt);}
.chat-msg.user{background:var(--mid);color:#fff;border-bottom-right-radius:3px;align-self:flex-end;}
.typing{background:var(--pale);align-self:flex-start;border-radius:var(--r);padding:12px 16px;}
.dot{width:7px;height:7px;background:var(--mid);border-radius:50%;display:inline-block;animation:bounce 1s infinite;margin:0 2px;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
.quick-questions{display:flex;flex-wrap:wrap;gap:6px;padding:8px 18px 6px;}
.quick-q{background:var(--pale);border:1px solid #b8dba0;border-radius:20px;padding:5px 12px;font-size:.72rem;color:var(--mid);font-weight:700;cursor:pointer;transition:.15s;}
.quick-q:active{background:var(--mid);color:#fff;}
.chat-input-area{display:flex;gap:8px;padding:10px 18px 12px;border-top:1px solid var(--sand);background:var(--card);flex-shrink:0;}
.chat-input{flex:1;padding:10px 14px;border:2px solid var(--sand);border-radius:20px;font-size:.82rem;font-family:'Nunito',sans-serif;color:var(--txt);}
.chat-input:focus{outline:none;border-color:var(--mid);}
.chat-send-btn{background:var(--mid);color:#fff;border:none;border-radius:20px;padding:10px 18px;font-size:.82rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap;}
.chat-send-btn:active{background:var(--forest);}

/* ══ MORE / SHARE ══════════════════════════════ */
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.share-btn{padding:13px 8px;border:none;border-radius:var(--r);font-size:.78rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s;letter-spacing:.2px;}
.share-btn:active{transform:scale(.97);}
.share-btn.wa{background:#25D366;color:#fff;}
.share-btn.pdf{background:var(--danger);color:#fff;}
.share-btn.sms{background:var(--info);color:#fff;}
.share-btn.copy{background:var(--earth);color:var(--gold-l);}
.pwa-install-btn{width:100%;background:linear-gradient(135deg,var(--green),var(--forest));color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:.88rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(42,100,42,.28);}
.info-card{background:var(--card);border-radius:var(--r);padding:15px;box-shadow:var(--shadow-sm);margin-bottom:8px;}
.info-card h3{font-family:'Merriweather',serif;font-size:.88rem;color:var(--earth);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.info-row{display:flex;justify-content:space-between;font-size:.76rem;padding:5px 0;border-bottom:1px solid var(--sand);}
.info-row:last-child{border:none;}
.info-label{color:var(--soft);}
.info-val{font-weight:700;color:var(--txt);}

<body>

<!-- HEADER -->
<div id="header">
  <div class="brand">
    <div class="brand-ico">🌾</div>
    <div>
      <div class="brand-name">AgriPulse</div>
      <div class="brand-tag" id="tagline">Smart Farming Advisory</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div><span>LIVE</span></div>
    <div class="lang-sw">
      <button class="lang-btn on" id="btnEN" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btnTA" onclick="setLang('ta')">த</button>
    </div>
  </div>
</div>

<!-- VOICE SCREEN -->
<div id="voiceScreen">
  <button class="vs-close" onclick="closeVoice()">✕</button>
  <div class="vs-title" id="vsTitle">🌾 AgriPulse Voice</div>
  <div class="vs-sub" id="vsSub">Press the button to hear your complete field advisory spoken aloud</div>
  <button class="vs-circle" id="vsBtn" onclick="voiceSpeak()">
    🎙️<span class="vs-circle-lbl" id="vsBtnLbl">SPEAK</span>
  </button>
  <div class="vs-status" id="vsStatus">Click your field on the map first</div>
  <div class="vs-scroll" id="vsText"></div>
  <button class="vs-back" onclick="closeVoice()">← Back to Map</button>
</div>

<!-- APP -->
<div id="app">

  <!-- MAP AREA -->
  <div id="mapArea">
    <div class="map-overlay">
      <b id="mhTitle">📍 Live Satellite Map</b>
      <span id="mhDesc">Click your field to get real-time advisory for that exact location</span>
    </div>
    <div class="coord-tag" id="coordTag"></div>
    <div id="map"></div>
    <button class="gps-btn" onclick="goToMyLocation()" title="My Location">📡</button>
    <button class="voice-fab" onclick="openVoice()" title="Voice Advisory">🎙️</button>
  </div>

  <!-- DESKTOP SIDEBAR -->
  <div id="sidebar">
    <div class="tabs">
      <button class="tab on" id="dt-adv" onclick="deskTab('adv')"><span class="ti">🌿</span><span id="tAdv">Advisory</span></button>
      <button class="tab" id="dt-fore" onclick="deskTab('fore')"><span class="ti">📈</span><span id="tFore">Forecast</span></button>
      <button class="tab" id="dt-soil" onclick="deskTab('soil')"><span class="ti">🌍</span><span id="tSoil">Soil</span></button>
      <button class="tab" id="dt-chat" onclick="deskTab('chat')"><span class="ti">🤖</span><span id="tChat">AI Chat</span></button>
      <button class="tab" id="dt-more" onclick="deskTab('more')"><span class="ti">⚙️</span><span id="tMore">More</span></button>
    </div>
    <div class="tab-body" id="sidebarBody"></div>
  </div>

</div>

<!-- MOBILE PANELS -->
<div class="panel" id="pAdv"></div>
<div class="panel" id="pFore"></div>
<div class="panel" id="pSoil"></div>
<div class="panel" id="pChat"></div>
<div class="panel" id="pMore"></div>

<!-- MOBILE BOTTOM NAV -->
<div id="bnav">
  <div class="bnav-row">
    <button class="bnav-btn on" id="bn-map" onclick="mobTab('map')"><span class="ni">🗺️</span><span id="bMap">Map</span></button>
    <button class="bnav-btn" id="bn-adv" onclick="mobTab('adv')"><span class="ni">🌿</span><span id="bAdv">Advisory</span></button>
    <button class="bnav-btn" id="bn-fore" onclick="mobTab('fore')"><span class="ni">📈</span><span id="bFore">Forecast</span></button>
    <button class="bnav-btn" id="bn-chat" onclick="mobTab('chat')"><span class="ni">🤖</span><span id="bChat">AI</span></button>
    <button class="bnav-btn" id="bn-more" onclick="mobTab('more')"><span class="ni">⚙️</span><span id="bMore">More</span></button>
  </div>
</div>

// ══════════════════════════════════════════════════════
// MAP SETUP — OpenStreetMap with Satellite layer option
// ══════════════════════════════════════════════════════
var MAP, MAP_MARKER;

function initMap() {
  MAP = L.map('map', { zoomControl: false }).setView([11.0, 78.0], 8);

  // Street layer
  var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  });

  // Satellite layer (ESRI — free, no API key needed)
  var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri Satellite', maxZoom: 19
  });

  // Hybrid — satellite + labels
  var hybrid = L.layerGroup([
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }),
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: 0.4, maxZoom: 19 })
  ]);

  street.addTo(MAP);

  L.control.layers({
    '🗺️ Street Map': street,
    '🛰️ Satellite': satellite,
    '🛰️ Satellite + Labels': hybrid
  }, {}, { position: 'topright' }).addTo(MAP);

  L.control.zoom({ position: 'bottomright' }).addTo(MAP);

  MAP.on('click', function(e) {
    var lat = e.latlng.lat, lng = e.latlng.lng;
    setLocation(lat, lng);
  });
}

function setLocation(lat, lng) {
  LATLON = { lat: lat, lng: lng };

  if (MAP_MARKER) MAP.removeLayer(MAP_MARKER);
  MAP_MARKER = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;background:#c8963e;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.5)"></div>',
      iconAnchor: [8, 8]
    })
  }).addTo(MAP);

  var ct = document.getElementById('coordTag');
  ct.textContent = '📍 ' + lat.toFixed(5) + ', ' + lng.toFixed(5);
  ct.style.display = 'block';

  fetchData(lat, lng);

  if (AUTO_TIMER) clearInterval(AUTO_TIMER);
  AUTO_TIMER = setInterval(function() {
    if (LATLON) fetchData(LATLON.lat, LATLON.lng);
  }, 600000);

  if (window.innerWidth <= 768) mobTab('adv');
}

function goToMyLocation() {
  if (!navigator.geolocation) return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      MAP.setView([lat, lng], 14);
      setLocation(lat, lng);
    },
    function() { alert('Could not get your location. Please click on map.'); }
  );
}

function deskTab(tab) {
  DESK_TAB = tab;
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('on'); });
  var b = document.getElementById('dt-' + tab); if (b) b.classList.add('on');
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('open'); });
  renderInto('sidebarBody', tab);
}

function mobTab(tab) {
  MOB_TAB = tab;
  document.querySelectorAll('.bnav-btn').forEach(function(b) { b.classList.remove('on'); });
  var b = document.getElementById('bn-' + tab); if (b) b.classList.add('on');
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('open'); });
  if (tab === 'map') return;
  var pm = { adv: 'pAdv', fore: 'pFore', soil: 'pSoil', chat: 'pChat', more: 'pMore' };
  var pid = pm[tab]; if (!pid) return;
  document.getElementById(pid).classList.add('open');
  renderInto(pid, tab);
}

function rerender() {
  if (window.innerWidth <= 768) {
    var pm = { adv: 'pAdv', fore: 'pFore', soil: 'pSoil', chat: 'pChat', more: 'pMore' };
    if (MOB_TAB !== 'map' && pm[MOB_TAB]) renderInto(pm[MOB_TAB], MOB_TAB);
  } else {
    renderInto('sidebarBody', DESK_TAB);
  }
}

function renderInto(cid, tab) {
  var el = document.getElementById(cid); if (!el) return;
  var builders = { adv: buildAdv, fore: buildFore, soil: buildSoil, chat: buildChat, more: buildMore };
  el.innerHTML = (builders[tab] || buildAdv)();
  if (tab === 'chat') initChat();
  if (tab === 'fore' && DATA && DATA.state === 'done') setTimeout(drawForeChart, 100);
}

// DATA FETCH
// ══════════════════════════════════════════════════════
function fetchData(lat, lon) {
  DATA = { state: 'loading' };
  rerender();

  fetch('/api/advisory?lat=' + lat + '&lon=' + lon)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.error) throw new Error(json.error);
      var w = json.weather;
      var r = runRules(w, json.rainNext3 || 0);
      DATA = {
        state: 'done',
        weather: w,
        loc: lat.toFixed(4) + ', ' + lon.toFixed(4),
        advice: r.advice,
        alerts: r.alerts,
        disease: detectDisease(w),
        soil: json.soil,
        kvk: json.kvk || [],
        forecast: json.forecast || [],
        rain3: json.rainNext3 || 0,
        ts: json.ts
      };
      // Get location name
      fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json')
        .then(function(r) { return r.json(); })
        .then(function(g) {
          var a = g.address || {};
          DATA.loc = [a.village || a.suburb || a.town || a.city, a.state_district, a.state].filter(Boolean).join(', ') || DATA.loc;
          rerender();
        }).catch(function() { rerender(); });
    })
    .catch(function(err) {
      DATA = { state: 'error', msg: err.message };
      rerender();
    });
}

// ══════════════════════════════════════════════════════
// RULES ENGINE — all logic based on real weather data
// ══════════════════════════════════════════════════════
function runRules(w, rain3) {
  var A = T[LANG].adv;
  var advice = [], alerts = [];
  var t = w.temperature, h = w.humidity, rain = w.precipitation, wind = w.wind_speed, uv = w.uv_index || 0;
  rain3 = rain3 || 0;

  // Irrigation
  if (rain > 8) advice.push(A.no_irr);
  else if (h < 30 && t > 38) { advice.push(A.drought); alerts.push('DROUGHT'); }
  else if (h < 42 && t > 34) { advice.push(A.high_irr); alerts.push('DROUGHT'); }
  else if (h < 55) advice.push(A.mod_irr);
  else advice.push(A.ok_moist);

  // Disease risk
  if (h > 85 && t > 25) { advice.push(A.fungal); alerts.push('DISEASE'); }
  else if (h > 72) advice.push(A.monitor);
  else advice.push(A.low_pest);

  // Spray timing
  if (wind > 28) { advice.push(A.no_spray); alerts.push('WIND'); }
  else if (rain > 2 || rain3 > 15) advice.push(A.rain_spray);
  else advice.push(A.ok_spray);

  // Temperature
  if (t > 42) { advice.push(A.heat); alerts.push('HEAT'); }
  else if (t < 14) advice.push(A.cold);
  else advice.push(A.ok_temp(t));

  // UV
  advice.push(uv > 8 ? A.uv_hi : A.uv_ok);

  // Rain forecast
  if (rain3 > 20) { advice.push(A.rain_coming); alerts.push('RAIN'); }
  else if (rain3 < 2) advice.push(A.rain_clear);

  return { advice: advice, alerts: alerts };
}

function detectDisease(w) {
  var h = w.humidity, t = w.temperature, rain = w.precipitation;
  var d = T[LANG].diseases;
  if (h > 85 && t > 27 && rain > 3) return d[2]; // Powdery Mildew
  if (h > 80 && t > 25) return d[1];               // Stem Borer risk
  if (h > 70 && rain > 3) return d[3];              // Brown Spot
  if (h > 65) return d[0];                          // Leaf Blight watch
  return d[4];                                       // No risk
}

function wIcon(code) {
  if (code === 0) return '☀️';
  if ([1,2,3].indexOf(code) >= 0) return '⛅';
  if ([45,48].indexOf(code) >= 0) return '🌫️';
  if ([51,53,55].indexOf(code) >= 0) return '🌦️';
  if ([61,63,65].indexOf(code) >= 0) return '🌧️';
  if ([80,81,82].indexOf(code) >= 0) return '⛈️';
  if ([95,96,99].indexOf(code) >= 0) return '🌩️';
  return '🌈';
}
function wLabel(code) {
  if (code === 0) return '☀️ Clear Sky';
  if ([1,2,3].indexOf(code) >= 0) return '🌤️ Partly Cloudy';
  if ([45,48].indexOf(code) >= 0) return '🌫️ Foggy';
  if ([51,53,55].indexOf(code) >= 0) return '🌦️ Drizzle';
  if ([61,63,65].indexOf(code) >= 0) return '🌧️ Rainfall';
  if ([80,81,82].indexOf(code) >= 0) return '⛈️ Heavy Showers';
  if ([95,96,99].indexOf(code) >= 0) return '🌩️ Thunderstorm';
  return '🌈 Mixed';
}

function initChat() {
  CHAT_HISTORY = [];
  var msgs = document.getElementById('chatMsgs'); if (!msgs) return;
  msgs.innerHTML = '';
  addChatMsg('bot', T[LANG].chatWelcome);
}

function sendQ(q) { var inp = document.getElementById('chatInput'); if (inp) { inp.value = q; sendChat(); } }

function sendChat() {
  var inp = document.getElementById('chatInput'); if (!inp) return;
  var q = inp.value.trim(); if (!q) return;
  inp.value = '';
  addChatMsg('user', q);
  var tid = 'typing_' + Date.now();
  addTyping(tid);

  var ctx = '';
  if (DATA && DATA.state === 'done') {
    ctx = 'Farmer field location: ' + DATA.loc + '. ' +
      'Current weather: Temperature ' + DATA.weather.temperature + '°C, ' +
      'Humidity ' + DATA.weather.humidity + '%, ' +
      'Rainfall ' + DATA.weather.precipitation + 'mm, ' +
      'Wind ' + DATA.weather.wind_speed + 'km/h. ' +
      'Soil type: ' + (DATA.soil ? DATA.soil.type : 'Unknown') + '. ' +
      'Rain next 3 days: ' + DATA.rain3 + 'mm. ';
  }

  CHAT_HISTORY.push({ role: 'user', content: q });

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: CHAT_HISTORY, context: ctx })
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      removeTyping(tid);
      if (data.error) {
        addChatMsg('bot', LANG === 'ta' ? 'மன்னிக்கவும், சேவை தற்காலிகமாக கிடைக்கவில்லை.' : 'Service temporarily unavailable. Please try again.');
        return;
      }
      var reply = data.reply || 'Sorry, please try again.';
      CHAT_HISTORY.push({ role: 'assistant', content: reply });
      addChatMsg('bot', reply);
    })
    .catch(function() {
      removeTyping(tid);
      addChatMsg('bot', LANG === 'ta' ? 'மன்னிக்கவும், பதில் கிடைக்கவில்லை. மீண்டும் முயற்சிக்கவும்.' : 'Could not connect. Please check internet and try again.');
    });
}

function addChatMsg(who, text) {
  var msgs = document.getElementById('chatMsgs'); if (!msgs) return;
  var d = document.createElement('div');
  d.className = 'chat-msg ' + who;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function addTyping(id) {
  var msgs = document.getElementById('chatMsgs'); if (!msgs) return;
  var d = document.createElement('div');
  d.className = 'typing'; d.id = id;
  d.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping(id) { var el = document.getElementById(id); if (el) el.remove(); }

// MORE
function buildMore() {
  var t = T[LANG];
  var notes = NOTES.slice(-5).reverse();
  var notesHTML = notes.length === 0 ?
    '<p style="font-size:.8rem;color:var(--soft);padding:4px 0;">' + t.noteEmpty + '</p>' :
    notes.map(function(n) {
      return '<div class="kvk-card" style="border-left-color:var(--gold);margin-bottom:8px;">' +
        '<div style="font-size:.65rem;color:var(--soft);margin-bottom:4px;">📅 ' + n.date + (n.loc ? ' • 📍 ' + n.loc : '') + '</div>' +
        '<div style="font-size:.8rem;line-height:1.5;">' + n.text + '</div>' +
      '</div>';
    }).join('');

  return '<div class="page-header"><h2>' + t.sMore + '</h2><p>' + t.sShare + ' • ' + t.sNotes + ' • ' + t.sAbout + '</p></div>' +

    '<div class="section"><div class="section-title">' + t.sShare + '</div>' +
      '<div class="share-grid">' +
        '<button class="share-btn wa" onclick="shareWA()">'+t.shareWA+'</button>' +
        '<button class="share-btn pdf" onclick="savePDF()">'+t.sharePDF+'</button>' +
        '<button class="share-btn sms" onclick="shareSMS()">'+t.shareSMS+'</button>' +
        '<button class="share-btn copy" onclick="copyText()">'+t.shareCopy+'</button>' +
      '</div>' +
      '<button class="pwa-install-btn" style="margin-top:10px;" onclick="installPWA()">'+t.pwaBtn+'</button>' +
    '</div>' +

    '<div class="section"><div class="section-title">' + t.sNotes + '</div>' +
      notesHTML +
      '<textarea style="width:100%;padding:10px 12px;border:2px solid var(--sand);border-radius:var(--r-sm);font-size:.82rem;font-family:Nunito,sans-serif;resize:vertical;min-height:75px;color:var(--txt);margin-top:4px;" id="noteTA" placeholder="' + t.notePH + '"></textarea>' +
      '<button class="btn-primary" style="margin-top:8px;" onclick="saveNote()">' + t.noteSave + '</button>' +
    '</div>' +

    '<div class="section"><div class="section-title">' + t.sAbout + '</div>' +
      '<div class="info-card">' +
        '<h3>📡 Real-Time Data Sources</h3>' +
        '<div class="info-row"><span class="info-label">🌤️ Weather & Forecast</span><span class="info-val">Open-Meteo API ✅</span></div>' +
        '<div class="info-row"><span class="info-label">🗺️ Map & Satellite</span><span class="info-val">OpenStreetMap + ESRI ✅</span></div>' +
        '<div class="info-row"><span class="info-label">📍 Location Name</span><span class="info-val">Nominatim OSM ✅</span></div>' +
        '<div class="info-row"><span class="info-label">🤖 AI Chat</span><span class="info-val">Claude AI (Anthropic) ✅</span></div>' +
        '<div class="info-row"><span class="info-label">🌍 Soil Data</span><span class="info-val">ICAR Zone Mapping ✅</span></div>' +
        '<div class="info-row"><span class="info-label">🏛️ KVK Centers</span><span class="info-val">ICAR Verified Data ✅</span></div>' +
      '</div>' +
      '<div class="accuracy-note">⚠️ Soil type is approximate based on Tamil Nadu agricultural zone mapping. For precise soil data, contact your nearest KVK center for soil testing.</div>' +
    '</div>';
}

// ══════════════════════════════════════════════════════
// VOICE
// ══════════════════════════════════════════════════════
function openVoice() {
  var t = T[LANG];
  document.getElementById('vsTitle').textContent = t.vsTitle;
  document.getElementById('vsSub').textContent = t.vsSub;
  document.getElementById('vsBtnLbl').textContent = t.vsBtnLbl;
  document.getElementById('vsStatus').textContent = DATA && DATA.state === 'done' ? '📍 ' + DATA.loc : t.vsStatus;
  document.getElementById('vsText').style.display = 'none';
  document.getElementById('voiceScreen').classList.add('show');
}

function closeVoice() {
  document.getElementById('voiceScreen').classList.remove('show');
  if (window.speechSynthesis && window.speechSynthesis.speaking) window.speechSynthesis.cancel();
}

function voiceSpeak() {
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    resetVoiceUI();
    return;
  }
  if (!DATA || DATA.state !== 'done') {
    document.getElementById('vsStatus').textContent = LANG === 'ta' ? 'முதலில் வரைபடத்தில் வயலை கிளிக் செய்யுங்கள்.' : 'Please click your field on the map first.';
    return;
  }
  var t = T[LANG], w = DATA.weather, dis = DATA.disease;
  var text, lc;

  if (LANG === 'ta') {
    text = 'வணக்கம்! நான் உங்கள் AgriPulse வேளாண் உதவியாளர். ' +
      'இடம்: ' + DATA.loc + '. ' +
      'தற்போதைய வானிலை: ' + wLabel(w.weather_code) + '. ' +
      'வெப்பநிலை ' + w.temperature + ' டிகிரி செல்சியஸ். ' +
      'ஈரப்பதம் ' + w.humidity + ' சதவீதம். ' +
      'மழைவீழ்ச்சி ' + w.precipitation + ' மில்லிமீட்டர். ' +
      'காற்றுவேகம் ' + w.wind_speed + ' கிலோமீட்டர் மணிக்கு. ' +
      DATA.advice.join('. ') + '. ' +
      'நோய் அபாயம்: ' + dis.name + '. ' + dis.action + '. ' +
      'உங்கள் வயலுக்கு இன்றைய ஆலோசனை முடிந்தது. மிக்க நன்றி!';
    lc = 'ta-IN';
  } else {
    text = 'Hello! I am your AgriPulse field advisor. ' +
      'Location: ' + DATA.loc + '. ' +
      'Current weather: ' + wLabel(w.weather_code) + '. ' +
      'Temperature is ' + w.temperature + ' degrees Celsius. ' +
      'Humidity is ' + w.humidity + ' percent. ' +
      'Rainfall is ' + w.precipitation + ' millimeters. ' +
      'Wind speed is ' + w.wind_speed + ' kilometers per hour. ' +
      DATA.advice.join('. ') + '. ' +
      'Disease risk assessment: ' + t.riskL[dis.risk] + ' — ' + dis.name + '. ' + dis.action + '. ' +
      'That is your complete field advisory for today. Thank you!';
    lc = 'en-IN';
  }

  var vt = document.getElementById('vsText');
  vt.textContent = text;
  vt.style.display = 'block';

  var u = new SpeechSynthesisUtterance(text);
  u.lang = lc; u.rate = 0.85; u.pitch = 1.0;

  var voices = window.speechSynthesis.getVoices();
  var best = voices.filter(function(v) { return v.lang === lc; })[0] ||
              voices.filter(function(v) { return v.lang.indexOf(lc.split('-')[0]) === 0; })[0];
  if (best) u.voice = best;

  var btn = document.getElementById('vsBtn');
  btn.classList.add('active');
  document.getElementById('vsBtnLbl').textContent = t.vsSpeaking || 'STOP';
  document.getElementById('vsStatus').textContent = t.vsSpeaking || 'Speaking…';

  u.onend = function() { resetVoiceUI(); document.getElementById('vsStatus').textContent = t.vsDone; };
  u.onerror = function() { resetVoiceUI(); };
  window.speechSynthesis.speak(u);
}

function resetVoiceUI() {
  var btn = document.getElementById('vsBtn'); if (btn) btn.classList.remove('active');
  var lbl = document.getElementById('vsBtnLbl'); if (lbl) lbl.textContent = T[LANG].vsBtnLbl;
}

// Advisory panel voice button
function toggleAdvVoice() {
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    setAdvVoiceBtn(false); return;
  }
  if (!DATA || DATA.state !== 'done') return;
  var t = T[LANG], w = DATA.weather, dis = DATA.disease;
  var text, lc;
  if (LANG === 'ta') {
    text = 'AgriPulse வயல் ஆலோசனை. இடம்: ' + DATA.loc + '. வெப்பநிலை ' + w.temperature + ' டிகிரி. ஈரப்பதம் ' + w.humidity + ' சதவீதம். ' + DATA.advice.join('. ') + '. நோய்: ' + dis.name + '. ' + dis.action + '.';
    lc = 'ta-IN';
  } else {
    text = 'AgriPulse Advisory. Location: ' + DATA.loc + '. Temperature ' + w.temperature + ' degrees. Humidity ' + w.humidity + ' percent. ' + DATA.advice.join('. ') + '. Disease: ' + t.riskL[dis.risk] + ' — ' + dis.name + '. ' + dis.action + '.';
    lc = 'en-IN';
  }
  var u = new SpeechSynthesisUtterance(text);
  u.lang = lc; u.rate = 0.87;
  var vs = window.speechSynthesis.getVoices();
  var bv = vs.filter(function(v) { return v.lang === lc; })[0] || vs.filter(function(v) { return v.lang.indexOf(lc.split('-')[0]) === 0; })[0];
  if (bv) u.voice = bv;
  u.onstart = function() { setAdvVoiceBtn(true); };
  u.onend = function() { setAdvVoiceBtn(false); };
  u.onerror = function() { setAdvVoiceBtn(false); };
  window.speechSynthesis.speak(u);
}

function setAdvVoiceBtn(speaking) {
  var b = document.getElementById('voiceAdvBtn'); if (!b) return;
  b.textContent = speaking ? T[LANG].btnStop : T[LANG].btnVoice;
  b.classList.toggle('danger', speaking);
}

function doRefresh() { if (LATLON) fetchData(LATLON.lat, LATLON.lng); }

// ══════════════════════════════════════════════════════
// SHARE
// ══════════════════════════════════════════════════════
function getShareText() {
  if (!DATA || DATA.state !== 'done') return 'No advisory data yet. Click your field on the map.';
  var w = DATA.weather;
  return '🌾 AgriPulse Field Advisory\n' +
    '📍 ' + DATA.loc + '\n' +
    '🌡️ ' + w.temperature + '°C | 💧 ' + w.humidity + '% | 🌧️ ' + w.precipitation + 'mm\n\n' +
    DATA.advice.join('\n') + '\n\n' +
    '🔬 Disease Risk: ' + DATA.disease.name + ' — ' + DATA.disease.action + '\n\n' +
    '⏰ Updated: ' + DATA.ts + '\n' +
    'Powered by AgriPulse 🌾';
}

function shareWA() { window.open('https://wa.me/?text=' + encodeURIComponent(getShareText()), '_blank'); }
function savePDF() { window.print(); }
function shareSMS() { window.open('sms:?body=' + encodeURIComponent(getShareText().substring(0, 160))); }
function copyText() {
  var text = getShareText();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { alert('Advisory copied to clipboard!'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('Copied!');
  }
}

// ══════════════════════════════════════════════════════
// NOTES
// ══════════════════════════════════════════════════════
function saveNote() {
  var inp = document.getElementById('noteTA'); if (!inp) return;
  var text = inp.value.trim(); if (!text) return;
  NOTES.push({ text: text, date: new Date().toLocaleDateString('en-IN'), loc: DATA && DATA.loc ? DATA.loc : '' });
  try { localStorage.setItem('agripulse_notes', JSON.stringify(NOTES)); } catch(e) {}
  inp.value = '';
  rerender();
}

// ══════════════════════════════════════════════════════
// PWA
// ══════════════════════════════════════════════════════
window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPWA = e; });
function installPWA() {
  if (deferredPWA) { deferredPWA.prompt(); deferredPWA.userChoice.then(function() { deferredPWA = null; }); }
  else { alert('Open in Chrome or Edge browser, then use menu → "Add to Home Screen" or "Install App".'); }
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
window.addEventListener('load', function() {
  initMap();
  updateStaticText();
  renderInto('sidebarBody', 'adv');
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function() {});
  if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
});
</script>
